name: android-debug-apk

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout Xray Core
        uses: actions/checkout@v4
        with:
          repository: laochendeai/Xray-core
          path: xray-core-src

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"
          cache-dependency-path: xray-core-src/go.sum

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform packages
        run: sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Build debug APK
        env:
          XRAY_CORE_REPO: ${{ github.workspace }}/xray-core-src
        run: |
          chmod +x gradlew scripts/build-debug-apk.sh
          ./scripts/build-debug-apk.sh

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
